<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>عرش الملوك | الأسطورة الكونية</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #02010a; }

    /* حذف "اليافطة" واستبدالها بإطار شفاف مائل */
    .golden-frame {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%) rotate(-4deg); /* الميل المطلوب */
      width: 85%;
      max-width: 750px;
      
      /* تصميم زجاجي شفاف لرؤية الشهب خلف الكلام */
      background: rgba(255, 215, 0, 0.02); 
      backdrop-filter: blur(5px); 
      -webkit-backdrop-filter: blur(5px);
      
      /* إطار ذهبي رفيع بلمعان خفيف */
      border: 1.5px solid rgba(212, 175, 55, 0.4); 
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
      
      padding: 1.5rem;
      text-align: center;
      z-index: 100;
      animation: frameBreath 4s ease-in-out infinite;
    }

    @keyframes frameBreath {
      0%, 100% { border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
      50% { border-color: rgba(255, 215, 0, 0.8); box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
    }

    h1 { font-size: clamp(1.1rem, 4vw, 1.7rem); font-weight: 900; background: linear-gradient(135deg, #FFE6A3, #ffd700); -webkit-background-clip: text; color: transparent; margin-bottom: 0.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .desc { font-size: clamp(0.75rem, 3vw, 0.9rem); color: #f0f0f0; line-height: 1.6; margin-bottom: 1rem; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }

    .btn {
      background: linear-gradient(90deg, #d4af37, #b8860b);
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: bold;
      color: #1a1508;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(212,175,55,0.5);
      animation: buttonPulse 2.5s infinite ease-in-out;
      pointer-events: auto;
    }

    @keyframes buttonPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(212,175,55,0.8); }
    }

    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
  </style>
</head>
<body>

  <div class="golden-frame">
    <h1>كوكب تاني – عرش الملوك الأسطوري</h1>
    <div class="desc">بين الشهب المتناثرة والنيازك المتأججة، يرتفع العرش ليفتح أبوابه لكل ملك يجرؤ على الحلم.</div>
    <button class="btn">ارتقِ إلى العرش الذهبي 👑</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010105);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // نجوم كثيفة (12,000 نجمة)
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(12000 * 3);
    for (let i = 0; i < 36000; i++) starPos[i] = (Math.random() - 0.5) * 600;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12 }));
    scene.add(stars);

    // الكوكب (العرش)
    const planet = new THREE.Mesh(
      new THREE.SphereGeometry(1.6, 64, 64),
      new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.9, roughness: 0.2, emissive: 0x331100, emissiveIntensity: 0.4 })
    );
    planet.position.y = 0.9;
    scene.add(planet);

    // الإطارات الكونية (تخترق الكوكب وتظهر من الأمام)
    const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.08, 16, 100), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1 }));
    ring1.position.y = 0.9;
    ring1.rotation.x = Math.PI / 1.6; // الزاوية اللي طلبتها
    ring1.rotation.y = 0.5;
    scene.add(ring1);

    const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.35, 0.04, 16, 100), new THREE.MeshStandardMaterial({ color: 0xffcc66, metalness: 1 }));
    ring2.position.y = 0.9;
    ring2.rotation.x = -Math.PI / 3.5;
    scene.add(ring2);

    // إضاءة نابضة
    const pLight = new THREE.PointLight(0xffaa00, 2, 50);
    pLight.position.set(3, 3, 5);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));

    function animate() {
      requestAnimationFrame(animate);
      planet.rotation.y += 0.004;
      ring1.rotation.z += 0.008;
      ring2.rotation.z -= 0.006;
      stars.rotation.y += 0.0001;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
