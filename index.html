<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>عرش الملوك | الأسطورة</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #02010a; }

    /* الإطار السفلي الشفاف والمايل - قمة الفخامة */
    .golden-frame {
      position: absolute;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%) rotate(-4deg); 
      width: 85%;
      max-width: 750px;
      background: rgba(0, 0, 0, 0.2); 
      border: 5px solid;
      border-image: linear-gradient(135deg, #b8860b, #ffd700, #b8860b) 1;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
      padding: 1.2rem;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      animation: frameGlow 4s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% { border-image-source: linear-gradient(135deg, #b8860b, #ffd700, #b8860b); filter: drop-shadow(0 0 5px #b8860b); }
      50% { border-image-source: linear-gradient(135deg, #ffd700, #ffffff, #ffd700); filter: drop-shadow(0 0 20px #ffd700); }
    }

    h1 { font-size: clamp(1rem, 4vw, 1.6rem); font-weight: 900; background: linear-gradient(135deg, #FFE6A3, #ffd700); -webkit-background-clip: text; color: transparent; margin-bottom: 0.4rem; }
    .desc { font-size: clamp(0.7rem, 3vw, 0.85rem); color: #e0e0e0; line-height: 1.5; margin-bottom: 0.8rem; text-shadow: 0 1px 3px black; }

    .btn {
      background: linear-gradient(90deg, #d4af37, #b8860b);
      border: none;
      padding: 10px 30px;
      border-radius: 40px;
      font-weight: 900;
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(212,175,55,0.6);
      animation: royalPulse 2s infinite ease-in-out;
      pointer-events: auto;
      display: inline-block;
    }

    @keyframes royalPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(212,175,55,0.5); }
      50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255, 215, 0, 0.9); }
    }

    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
  </style>
</head>
<body>

  <div class="golden-frame">
    <h1>كوكب تاني – عرش الملوك الأسطوري</h1>
    <div class="desc">بين الشهب المتناثرة والنيازك المتأججة، يرتفع العرش ليفتح أبوابه لكل ملك يجرؤ على الحلم.</div>
    <button class="btn">ارتقِ إلى العرش الذهبي 👑</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010105);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 8.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // نجوم كثيفة
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(12000 * 3);
    for (let i = 0; i < 36000; i++) starPos[i] = (Math.random() - 0.5) * 500;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12 }));
    scene.add(stars);

    // الكوكب (العرش)
    const planet = new THREE.Mesh(
      new THREE.SphereGeometry(1.6, 64, 64),
      new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.9, roughness: 0.2, emissive: 0x331100, emissiveIntensity: 0.5 })
    );
    planet.position.y = 1.0;
    scene.add(planet);

    // الإطارات الكونية المتقاطعة
    const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.1, 16, 100), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1 }));
    ring1.position.y = 1.0;
    ring1.rotation.x = Math.PI / 1.6;
    ring1.rotation.y = 0.5;
    scene.add(ring1);

    const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.3, 0.05, 16, 100), new THREE.MeshStandardMaterial({ color: 0xffcc66, metalness: 1 }));
    ring2.position.y = 1.0;
    ring2.rotation.x = -Math.PI / 3.5;
    scene.add(ring2);

    const pLight = new THREE.PointLight(0xffaa00, 2, 50);
    pLight.position.set(3, 3, 5);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));

    function animate() {
      requestAnimationFrame(animate);
      planet.rotation.y += 0.004;
      ring1.rotation.z += 0.008;
      ring2.rotation.z -= 0.006;
      stars.rotation.y += 0.0001;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
